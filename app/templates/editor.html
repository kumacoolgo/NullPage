<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Text Board</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body>
    <div class="editor-container">
        <textarea
            id="editor"
            spellcheck="false"
            autocorrect="off"
            autocapitalize="off"
            autocomplete="off"
            placeholder="Paste your text here..."
        >{{ content }}</textarea>

        <div class="toolbar">
            <button id="btn-clear" type="button">Clear</button>
            <button id="btn-a-minus" type="button">A-</button>
            <button id="btn-a-plus" type="button">A+</button>
            <button id="btn-save" type="button">Save</button>
        </div>
    </div>

    <script src="/static/app.js"></script>
    <script>
        // Initialize with saved font size
        const initialFontSize = {{ font_size_px }};
        initEditor(initialFontSize);
    </script>
</body>
</html>
